name: Build and release tweaked IPA

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: 'Direct URL to a decrypted YouTube.ipa (leave blank if using release_tag)'
        required: false
        type: string
      release_tag:
        description: 'Release tag in this repo to download YouTube.ipa from (e.g. v19.00.0)'
        required: false
        type: string
      artifact_filename:
        description: 'Filename of the YouTube.ipa asset on the release (required with release_tag)'
        required: false
        type: string
      prerelease:
        description: 'Pre-release?'
        required: true
        type: boolean
      enable_isponsorblock:
        description: 'Include iSponsorBlock'
        required: true
        type: boolean
        default: true
      enable_ryd:
        description: 'Include Return YouTube Dislikes'
        required: true
        type: boolean
        default: true
      enable_youspeed:
        description: 'Include YouSpeed'
        required: true
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and release tweaked IPA
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Validate inputs
        run: |
          if [ -z "${{ inputs.ipa_url }}" ] && [ -z "${{ inputs.release_tag }}" ]; then
            echo "Error: Either 'ipa_url' or 'release_tag' must be provided."
            exit 1
          fi
          if [ -n "${{ inputs.release_tag }}" ] && [ -z "${{ inputs.artifact_filename }}" ]; then
            echo "Error: 'artifact_filename' is required when using 'release_tag'."
            exit 1
          fi

      - name: Parse control file version
        id: parse_control
        run: |
          version=$(sed -n 's/^Version: //p' control | sed 's/~/-/g')
          echo "TWEAK_VERSION=$version" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: |
          brew install ldid dpkg make pipx
          pipx install --force https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip

      - name: Set PATH environment variable
        run: |
          echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH
          pipx ensurepath

      - name: Setup Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          ref: master
          path: theos
          submodules: recursive

      - name: Cache iOS SDK
        id: sdk-cache
        uses: actions/cache@v4
        with:
          path: theos/sdks/iPhoneOS16.5.sdk
          key: iPhoneOS16.5.sdk

      - name: Download iOS SDK
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          git clone -n --depth=1 --filter=tree:0 https://github.com/theos/sdks.git
          cd sdks
          git sparse-checkout set --no-cone iPhoneOS16.5.sdk
          git checkout
          mv iPhoneOS16.5.sdk "$GITHUB_WORKSPACE/theos/sdks/"

      - name: Build deb
        run: make package FINALPACKAGE=1 ENABLE_ISPONSORBLOCK=${{ inputs.enable_isponsorblock && '1' || '0' }} ENABLE_RYD=${{ inputs.enable_ryd && '1' || '0' }} ENABLE_YOUSPEED=${{ inputs.enable_youspeed && '1' || '0' }}
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Download YouTube IPA from URL
        if: inputs.ipa_url != ''
        run: |
          echo "Downloading YouTube IPA from: ${{ inputs.ipa_url }}"
          curl -L --fail -o YouTube.ipa "${{ inputs.ipa_url }}"

      - name: Download YouTube IPA from release
        if: inputs.ipa_url == '' && inputs.release_tag != ''
        uses: robinraju/release-downloader@v1.10
        with:
          repository: ${{ github.repository }}
          tag: ${{ inputs.release_tag }}
          fileName: ${{ inputs.artifact_filename }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename release artifact
        if: inputs.ipa_url == '' && inputs.release_tag != ''
        run: mv "${{ inputs.artifact_filename }}" YouTube.ipa

      - name: Verify YouTube IPA
        run: |
          if [ ! -f YouTube.ipa ]; then
            echo "Error: YouTube.ipa not found."
            exit 1
          fi
          if ! unzip -t YouTube.ipa > /dev/null; then
            echo "Error: YouTube.ipa is not a valid zip archive or is corrupted."
            exit 1
          fi
          echo "YouTube.ipa size: $(wc -c < YouTube.ipa) bytes"

      - name: Merge deb and extension into IPA
        env:
          TWEAK_VERSION: ${{ steps.parse_control.outputs.TWEAK_VERSION }}
        run: |
          appex="Extensions/OpenYouTubeSafariExtension/OpenYouTubeSafariExtension.appex"
          deb=$(ls packages/*.deb | head -n1)
          cyan -i YouTube.ipa -o YTMinimal_${TWEAK_VERSION}.ipa -uwef "$deb" "$appex"

      - name: Create release
        uses: softprops/action-gh-release@v0.1.15
        env:
          TWEAK_VERSION: ${{ steps.parse_control.outputs.TWEAK_VERSION }}
        with:
          draft: true
          tag_name: v${{ env.TWEAK_VERSION }}-ipa
          name: v${{ env.TWEAK_VERSION }} (IPA)
          files: |
            YTMinimal_${{ env.TWEAK_VERSION }}.ipa
          prerelease: ${{ inputs.prerelease }}
